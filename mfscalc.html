<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFS Calc</title>

  <!-- Tailwind & Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#375f54',
            secondary: '#82cfff',
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen transition-all duration-500 
bg-gradient-to-br from-teal-50 via-white to-blue-100 
dark:from-gray-900 dark:via-slate-800 dark:to-black 
text-gray-800 dark:text-gray-200">

<!-- ===== Header ===== -->
<header class="bg-primary dark:bg-gray-800 sticky top-0 z-50 shadow">
  <nav class="max-w-6xl mx-auto flex justify-between items-center px-4 py-3">

    <h1 class="text-white font-semibold text-lg md:text-xl">MFS~Calc</h1>

    <div class="flex items-center gap-3">
      <button id="themeToggle" class="text-white text-lg transition-transform duration-200" aria-label="Toggle Dark/Light Mode">🌙</button>
      <button id="menuBtn" class="md:hidden text-white text-2xl transition-transform duration-200" aria-label="Toggle Menu" aria-expanded="false">☰</button>
    </div>

    <!-- Desktop Menu -->
    <div class="hidden md:flex gap-6 text-white text-sm">
      <a href="index.html" class="hover:text-white transition-colors duration-200">Home</a>
      <a href="contact.html" class="hover:text-white transition-colors duration-200">Contact</a>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden hidden bg-primary dark:bg-gray-800 px-5 pb-4 pt-2 shadow-inner transition-all duration-300">
    <a href="index.html" class="block py-2 text-white/90 hover:text-white">Home</a>
    <a href="contact.html" class="block py-2 text-white font-medium hover:text-white/90">Contact</a>
  </div>
</header>

<!-- ===== Main Content ===== -->
<div class="pt-24 px-4 flex justify-center">
  <div class="w-full max-w-md 
    bg-white/80 dark:bg-gray-900/80 
    backdrop-blur-lg rounded-xl p-5 shadow-lg transition">

    <!-- Result -->
    <div class="text-center mb-5">
      <h1 class="text-gray-800 dark:text-white text-lg md:text-xl font-semibold">
        Total charge:
      </h1>
      <p id="result" class="text-2xl font-bold text-gray-900 dark:text-white mt-2">0</p>
    </div>

    <!-- Input -->
    <input id="number1"
      type="number"
      placeholder="Enter amount"
      class="w-full p-3 rounded-lg mb-5 text-lg outline-none 
      bg-gray-100 dark:bg-gray-800 
      text-black dark:text-white">

    <h2 class="text-center mb-4 font-medium text-gray-700 dark:text-gray-300">
      Choose Service
    </h2>

    <div class="space-y-4">

      <!-- USSD -->
      <div>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">Cashout [USSD]</p>
        <div class="grid grid-cols-3 gap-2">
          <button data-rate="0.0185" data-type="Bkash [*247#]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash</button>
          <button data-rate="0.015" data-type="Nagad [*167#]" class="calcButton bg-orange-600 text-black p-3 rounded-lg">Nagad</button>
          <button data-rate="0.018" data-type="Rocket [*322#]" class="calcButton bg-purple-900 text-white p-3 rounded-lg">Rocket</button>
        </div>
      </div>

      <!-- APP -->
      <div>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">Cashout [App]</p>
        <div class="grid grid-cols-3 gap-2">
          <button data-rate="0.0185" data-type="Bkash [APP]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash</button>
          <button data-rate="0.0125" data-type="Nagad [APP]" class="calcButton bg-orange-600 text-black p-3 rounded-lg">Nagad</button>
          <button data-rate="0.018" data-type="Rocket [APP]" class="calcButton bg-purple-900 text-white p-3 rounded-lg">Rocket</button>
        </div>
      </div>

      <!-- Other -->
      <div>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">Other</p>
        <div class="grid grid-cols-3 gap-2">
          <button data-rate="0.009" data-type="Rocket [ATM]" class="calcButton bg-purple-900 text-white p-3 rounded-lg">Rocket ATM</button>
          <button data-rate="0.0149" data-type="Bkash [Fav]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash Fav</button>
          <button data-rate="0.0149" data-type="Bkash [ATM]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash ATM</button>
        </div>
      </div>

      <!-- Bank -->
      <div>
        <p class="text-gray-600 dark:text-gray-400 text-sm mb-2">Bank Transfer</p>
        <div class="grid grid-cols-2 gap-2">
          <button data-rate="0.0125" data-type="Bkash To [Other Bank]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash To [Other Bank]</button>
          <button data-rate="0.0115" data-type="Bkash To [BRAC]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash To [BRAC]</button>
          <button data-rate="0.015" data-type="Nagad To [Bank]" class="calcButton bg-orange-600 text-black p-3 rounded-lg">Nagad To [Bank]</button>
          <button data-rate="0.0850" data-type="Bkash To [NPSB]" class="calcButton bg-pink-600 text-white p-3 rounded-lg">Bkash NPSB</button>
        </div>
      </div>

    </div>

    <!-- Clear Button -->
    <button id="clearButton" class="w-full mt-5 bg-red-900 text-white p-3 rounded-lg flex items-center justify-center gap-2">
      <i class="fas fa-trash"></i>
      Clear
    </button>

  </div>
</div>

<!-- ===== Scripts ===== -->
<script>
  // ===== Theme Toggle =====
  const themeBtn = document.getElementById("themeToggle");
  const html = document.documentElement;

  (function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark" || (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      html.classList.add("dark");
      themeBtn.textContent = "☀️";
    } else {
      themeBtn.textContent = "🌙";
    }
  })();

  themeBtn.addEventListener("click", () => {
    if (html.classList.contains("dark")) {
      html.classList.remove("dark");
      localStorage.setItem("theme", "light");
      themeBtn.textContent = "🌙";
    } else {
      html.classList.add("dark");
      localStorage.setItem("theme", "dark");
      themeBtn.textContent = "☀️";
    }
  });

  // ===== Mobile Menu =====
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
    const expanded = menuBtn.getAttribute("aria-expanded") === "true";
    menuBtn.setAttribute("aria-expanded", !expanded);
  });

  document.addEventListener("click", (e) => {
    if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
      mobileMenu.classList.add("hidden");
      menuBtn.setAttribute("aria-expanded", false);
    }
  });

  // ===== Calculator Logic =====
  document.addEventListener('DOMContentLoaded', function() {
    const resultSpan = document.getElementById('result');
    const clearButton = document.getElementById('clearButton');
    const calcButtons = document.querySelectorAll('.calcButton');

    calcButtons.forEach(button => {
      button.addEventListener('click', function() {
        const rate = parseFloat(this.dataset.rate);
        const amountInput = document.getElementById('number1').value;
        const amount = parseFloat(amountInput);

        if (amountInput.trim() === '') return alert('Please enter an amount');
        if (isNaN(amount)) return alert('Please enter a valid number');
        if (amountInput.includes('.')) return resultSpan.textContent = '0';
        if (amount < 0) return alert('Amount cannot be negative');
        if (amount === 0) return resultSpan.textContent = '0';

        resultSpan.textContent = `${(amount * rate).toFixed(2)} Tk ${this.dataset.type}`;
      });
    });

    clearButton.addEventListener('click', function() {
      resultSpan.textContent = '0';
      document.getElementById('number1').value = '';
    });
  });
</script>

<!-- ===== Footer ===== -->
<footer class="bg-gray-900 text-white py-8 text-center">
  <p>&copy; 2026 MFS~Calc. All Rights Reserved. Developed by <a href="https://nh-404.github.io" class="text-blue-400 hover:underline">Tasnimul Hasan</a></p>
</footer>

</body>
</html>
